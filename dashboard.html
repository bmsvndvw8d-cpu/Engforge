<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Dashboard</title>

  <link
    rel="stylesheet"
    href="dashboard.css" />
</head>

<body>

  <div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-logo">🔥</div>

      <div class="sidebar-menu">

        <button class="menu-btn active">1</button>
        <button class="menu-btn">2</button>
        <button class="menu-btn">3</button>
        <button class="menu-btn">4</button>
        <button class="menu-btn">5</button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

      <div class="topbar">

        <div class="hero">

          <h1>EngForge</h1>

          <p>
            문제를 단련하고,
            교재를 제작하다.
          </p>

        </div>

        <div class="top-right">

          <button class="create-btn">
            문제지 만들기
          </button>

          <div class="user-box">

            <div class="user-name">
              👤 채애앤니 님
            </div>

            <button
              class="logout-btn"
              onclick="logout()">

              로그아웃

            </button>

          </div>

        </div>

      </div>

      <!-- CARDS -->

      <section class="cards">

        <div class="card">

          <div class="card-thumb"></div>

          <h3>2026 수능 영어 문제지</h3>

          <p>제작일 : 2026.05.25</p>

        </div>

        <div class="card">

          <div class="card-thumb"></div>

          <h3>확률과 통계</h3>

          <p>제작일 : 2026.05.25</p>

        </div>

        <div class="card">

          <div class="card-thumb"></div>

          <h3>미적분 킬러 문제</h3>

          <p>제작일 : 2026.05.25</p>

        </div>

      </section>

    </main>

  </div>

  <!-- HELP -->

  <button
    class="help-btn"
    onclick="location.href='help.html'">

    ?

  </button>

  <script>

    function logout() {

      localStorage.removeItem("currentUser");

      location.href = "login.html";
    }

  </script>

</body>

</html>
