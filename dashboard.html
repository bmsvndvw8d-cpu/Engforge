<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>EngForge Dashboard</title>

  <link
    rel="stylesheet"
    href="dashboard.css" />
</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-logo">
      🔥
    </div>

    <div class="sidebar-menu">

      <button class="menu-btn active">1</button>
      <button class="menu-btn">2</button>
      <button class="menu-btn">3</button>
      <button class="menu-btn">4</button>
      <button class="menu-btn">5</button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- TOP -->

    <div class="top-bar">

      <div class="title-wrap">

        <h1>EngForge</h1>

        <p>
          문제를 단련하고,
          교재를 제작하다.
        </p>

      </div>

      <div class="user-wrap">

        <button class="create-btn">
          문제지 만들기
        </button>

        <div class="user-box">

          <div class="user-name">
            👤 채애엔니 님
          </div>

          <a
            href="login.html"
            class="logout">

            로그아웃

          </a>

        </div>

      </div>

    </div>

    <!-- FILTER -->

    <div class="filter-row">

      <button class="filter-chip">
        제작 날짜순
      </button>

      <button class="filter-chip">
        난이도순
      </button>

      <button class="filter-chip">
        문항수순
      </button>

    </div>

    <!-- CARD GRID -->

    <section class="card-grid">

      <!-- CARD -->

      <div class="card">

        <div>

          <h2>
            2026 수능 영어 실전 12회
          </h2>

          <div class="card-sub">
            고3 · 영어
          </div>

          <div class="card-tags">

            <div class="tag">
              듣기 포함
            </div>

            <div class="tag">
              PDF 생성 완료
            </div>

          </div>

        </div>

        <div class="card-bottom">

          <div class="card-sub">
            최종 수정 · 3시간 전
          </div>

          <button class="open-btn">
            열기
          </button>

        </div>

      </div>

      <!-- CARD -->

      <div class="card">

        <div>

          <h2>
            고2 문법 킬러 특강
          </h2>

          <div class="card-sub">
            고2 · 영어
          </div>

          <div class="card-tags">

            <div class="tag">
              문항 16개
            </div>

            <div class="tag">
              서술형 포함
            </div>

            <div class="tag">
              제작중
            </div>

          </div>

        </div>

        <div class="card-bottom">

          <div class="card-sub">
            최종 수정 · 1일 전
          </div>

          <button class="open-btn">
            열기
          </button>

        </div>

      </div>

    </section>

  </main>

  <!-- HELP -->

  <button
    class="help-btn"
    onclick="location.href='help.html'">

    ?

  </button>

</body>
</html>
