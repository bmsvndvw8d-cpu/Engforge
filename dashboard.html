<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>EngForge Dashboard</title>

  <link
    rel="stylesheet"
    href="dashboard.css" />

</head>

<body>

  <div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="logo">
        🔥
      </div>

      <div class="menu-list">

        <button class="menu-btn active">1</button>
        <button class="menu-btn">2</button>
        <button class="menu-btn">3</button>
        <button class="menu-btn">4</button>
        <button class="menu-btn">5</button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="main">
      <div class="main-inner">
      </main>
      </div>

      <!-- TOP -->

      <header class="topbar">

        <div>

          <h1>EngForge</h1>

          <p>
            문제를 단련하고,
            교재를 제작하다.
          </p>

        </div>

        <div class="top-right">

          <button class="create-btn">
            문제지 만들기
          </button>

          <div class="user-box">

            <div class="user-name">
              👤 채애앤니 님
            </div>

            <button
              class="logout-btn"
              onclick="logout()">

              로그아웃

            </button>

          </div>

        </div>

      </header>

      <!-- FILTER -->

      <section class="filter-bar">

        <button class="filter active">
          최신순
        </button>

        <button class="filter">
          제작날짜순
        </button>

        <button class="filter">
          난이도순
        </button>

        <button class="filter">
          문제수순
        </button>

      </section>

      <!-- WORKSHEET -->

      <section class="worksheet-list">

        <div class="worksheet-card">

          <div class="card-top">

            <div>

              <h2>
                2026 수능 영어 실전 12회
              </h2>

              <span>
                고3 · 영어
              </span>

            </div>

            <div class="difficulty high">
              중상
            </div>

          </div>

          <div class="card-middle">

            <div class="meta">
              문항 28개
            </div>

            <div class="meta">
              듣기 포함
            </div>

            <div class="meta">
              PDF 생성 완료
            </div>

          </div>

          <div class="card-bottom">

            <span>
              최종 수정 · 2시간 전
            </span>

            <button>
              열기
            </button>

          </div>

        </div>

        <!-- CARD -->

        <div class="worksheet-card">

          <div class="card-top">

            <div>

              <h2>
                고2 미적분 킬러 특강
              </h2>

              <span>
                고2 · 수학
              </span>

            </div>

            <div class="difficulty mid">
              중
            </div>

          </div>

          <div class="card-middle">

            <div class="meta">
              문항 16개
            </div>

            <div class="meta">
              서술형 포함
            </div>

            <div class="meta">
              제작중
            </div>

          </div>

          <div class="card-bottom">

            <span>
              최종 수정 · 1일 전
            </span>

            <button>
              열기
            </button>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- HELP -->

  <button
    class="help-btn"
    onclick="location.href='help.html'">

    ?

  </button>

  <script>

    function logout() {

      localStorage.removeItem("currentUser");

      location.href = "login.html";
    }

  </script>

</body>

</html>
