<!-- landing.html -->

<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>EngForge</title>

  <link
    rel="stylesheet"
    href="landing.css" />

</head>

<body>

  <!-- 배경 -->

  <div class="bg"></div>

  <div class="noise"></div>

  <!-- 헤더 -->

  <header>

    <div class="logo">

      🔥 EngForge

    </div>

    <button
      class="login-btn"
      onclick="location.href='login.html'">

      로그인

    </button>

  </header>

  <!-- HERO -->

  <section class="hero">

    <div class="hero-content">

      <h1>

        문제를<br>
        단련하다.

      </h1>

      <p>

        EngForge는<br>
        문제를 조립하고,<br>
        교재를 제작하는<br>
        디지털 공방입니다.

      </p>

      <button
        class="start-btn"
        onclick="location.href='login.html'">

        시작하기

      </button>

    </div>

    <!-- 불꽃 -->

    <div class="forge-area">

      <div class="forge-core"></div>

      <div class="ember ember1"></div>
      <div class="ember ember2"></div>
      <div class="ember ember3"></div>
      <div class="ember ember4"></div>

    </div>

  </section>

  <!-- SECTION 2 -->

  <section class="feature-section">

    <div class="feature-card">

      <div class="orange-line"></div>

      <h2>

        문제 선택

      </h2>

      <p>

        유형 · 난이도 · 단원별로<br>
        원하는 문제를 빠르게 찾습니다.

      </p>

    </div>

    <div class="feature-card">

      <div class="orange-line"></div>

      <h2>

        장바구니 구성

      </h2>

      <p>

        문제를 담고 순서를 바꾸며<br>
        시험지를 제작합니다.

      </p>

    </div>

    <div class="feature-card">

      <div class="orange-line"></div>

      <h2>

        PDF 출력

      </h2>

      <p>

        클릭 한 번으로<br>
        바로 인쇄 가능한 시험지를 생성합니다.

      </p>

    </div>

  </section>

  <!-- SECTION 3 -->

  <section class="final-section">

    <div class="final-box">

      <h2>

        교재 제작의 새로운 공방

      </h2>

      <p>

        EngForge와 함께<br>
        더 빠르고 감각적으로<br>
        문제지를 제작해보세요.

      </p>

      <button
        class="start-btn"
        onclick="location.href='login.html'">

        시작하기

      </button>

    </div>

  </section>

</body>

</html>
