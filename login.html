<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>EngForge Login</title>

  <link
    rel="stylesheet"
    href="login.css" />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

</head>

<body>

  <div class="login-page">

    <div class="login-box">

      <!-- LEFT -->

      <div class="login-left">

        <div class="fire-bg"></div>

        <div class="left-content">

          <div class="logo">

            🔥 EngForge

          </div>

          <h1>

            문제를<br>
            단련하다.

          </h1>

          <p>

            문제 제작과 교재 구성을<br>
            더 빠르고 직관적으로 경험하세요.

          </p>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="login-right">

        <div class="mobile-logo">

          🔥 EngForge

        </div>

        <h2>

          로그인

        </h2>

        <!-- 핵심 -->
        <form id="loginForm">

          <input
            type="email"
            id="email"
            placeholder="email"
            required />

          <input
            type="password"
            id="password"
            placeholder="password"
            required />

          <!-- 엔터 가능 -->
          <button
            type="submit"
            class="main-btn">

            login

          </button>

        </form>

        <button
          class="sub-btn"
          onclick="location.href='signup.html'">

          sign up

        </button>

        <div class="social-title">

          간편 로그인

        </div>

        <div class="social-row">

          <!-- GOOGLE -->

          <button class="social-btn google">

            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
              alt="google">

          </button>

          <!-- KAKAO -->

          <button class="social-btn kakao">

            <img
              src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg"
              alt="kakao">

          </button>

          <!-- NAVER -->

          <button class="social-btn naver">

            <img
              src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Naver_Logotype.svg"
              alt="naver">

          </button>

          <!-- APPLE -->

          <button class="social-btn apple">

            <img
              src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
              alt="apple">

          </button>

        </div>

        <a
          href="#"
          class="find-link">

          아이디 · 비밀번호 찾기

        </a>

      </div>

    </div>

  </div>

  <script type="module" src="login.js"></script>

</body>

</html>
