<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>EngForge Login</title>

  <link
    rel="stylesheet"
    href="login.css" />

</head>

<body>

  <div class="login-page">

    <div class="login-box">

      <!-- LEFT -->

      <div class="login-left">

        <div class="fire-bg"></div>

        <div class="left-content">

          <div class="logo">
            🔥 EngForge
          </div>

          <h1>
            문제를<br>
            단련하다.
          </h1>

          <p>
            문제 제작과 교재 구성을<br>
            더 빠르고 직관적으로 경험하세요.
          </p>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="login-right">

        <div class="mobile-logo">
          🔥 EngForge
        </div>

        <h2>
          로그인
        </h2>

        <form id="loginForm">

          <input
            type="email"
            placeholder="email"
            required />

          <input
            type="password"
            placeholder="password"
            required />

          <button
            type="submit"
            class="main-btn">

            login

          </button>

        </form>

        <button
          class="sub-btn"
          onclick="location.href='signup.html'">

          sign up

        </button>

        <div class="social-title">
          간편 로그인
        </div>

        <div class="social-row">

          <!-- GOOGLE -->

          <button class="social-btn google">
            G
          </button>

          <!-- KAKAO -->

          <button class="social-btn kakao">

            <svg
              width="34"
              height="34"
              viewBox="0 0 24 24"
              fill="none">

              <path
                d="M12 3C6.477 3 2 6.58 2 11C2 13.93 4.08 16.49 7.12 17.74L6 22L10.31 18.96C10.86 19.03 11.42 19.07 12 19.07C17.523 19.07 22 15.49 22 11C22 6.58 17.523 3 12 3Z"
                fill="black"/>

            </svg>

          </button>

          <!-- NAVER -->

          <button class="social-btn naver">

            <span>N</span>

          </button>

          <!-- APPLE -->

          <button class="social-btn apple">

            

          </button>

        </div>

        <a
          href="#"
          class="find-link">

          아이디 · 비밀번호 찾기

        </a>

      </div>

    </div>

  </div>

  <script>

    const form =
      document.getElementById("loginForm");

    form.addEventListener("submit", function(e){

      e.preventDefault();

      location.href = "dashboard.html";

    });

  </script>

</body>

</html>
