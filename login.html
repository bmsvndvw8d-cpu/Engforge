<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>EngForge Login</title>

  <link
    rel="stylesheet"
    href="login.css">

</head>

<body>

  <div class="login-wrapper">

    <!-- 왼쪽 -->

    <div class="left-panel">

      <div class="forge-glow"></div>

      <div class="left-content">

        <h1>

          EngForge

        </h1>

        <h2>

          교재 제작의 대장간

        </h2>

        <p>

          문제를 단련하고,<br>
          교재를 제작하다.

        </p>

      </div>

    </div>

    <!-- 오른쪽 -->

    <div class="right-panel">

      <div class="login-box">

        <div class="logo">

          🔥

        </div>

        <h2>

          로그인

        </h2>

        <!-- 이메일 -->

        <input
          type="email"
          id="email"
          placeholder="email">

        <!-- 비밀번호 -->

        <input
          type="password"
          id="password"
          placeholder="password">

        <!-- 로그인 -->

        <button id="loginBtn">

          login

        </button>

        <!-- 회원가입 -->

        <button id="signupBtn">

          sign up

        </button>

        <!-- 간편로그인 -->

        <div class="social-title">

          간편 로그인

        </div>

<div class="social-login">

  <!-- 구글 -->

  <button
    id="googleBtn"
    class="social-btn">

    <img
      src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

  </button>

  <!-- 카카오 -->

  <button class="social-btn kakao-btn">

    <img
      src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg">

  </button>

  <!-- 네이버 -->

  <button class="social-btn naver-btn">

    <span>N</span>

  </button>

  <!-- 애플 -->

  <button class="social-btn apple-btn">

    

  </button>

</div>

        <!-- 찾기 -->

        <div class="find-text">

          아이디 · 비밀번호 찾기

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="login.js">

  </script>

</body>

</html>
