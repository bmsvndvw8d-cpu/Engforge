<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>회원가입 | EngForge</title>

  <link
    rel="stylesheet"
    href="signup.css" />

</head>

<body>

  <div class="signup-page">

    <div class="signup-box">

      <!-- LEFT -->

      <div class="signup-left">

        <div class="fire-bg"></div>

        <div class="left-content">

          <div class="logo">
            🔥 EngForge
          </div>

          <h1>
            교재를<br>
            제작하다.
          </h1>

          <p>
            선생님의 문제 제작을<br>
            더 빠르고 직관적으로.<br><br>

            EngForge와 함께<br>
            디지털 공방을 시작하세요.
          </p>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="signup-right">

        <div class="mobile-logo">
          🔥 EngForge
        </div>

        <h2>회원가입</h2>

        <form id="signupForm">

          <input
            type="text"
            id="nickname"
            placeholder="nickname"
            required />

          <input
            type="email"
            id="email"
            placeholder="email"
            required />

          <input
            type="password"
            id="password"
            placeholder="password"
            required />

          <button
            type="submit"
            class="main-btn">

            sign up

          </button>

        </form>

        <button
          class="sub-btn"
          onclick="location.href='login.html'">

          login

        </button>

      </div>

    </div>

  </div>

  <script type="module" src="signup.js"></script>

</body>
</html>
