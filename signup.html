<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <title>WS Sign Up</title>

  <link
    href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css"
    rel="stylesheet">

  <link rel="stylesheet" href="signup.css">

</head>

<body>

  <div class="signup-container">

    <!-- 왼쪽 -->

    <div class="left-section">

      <div class="left-content">

        <h1 class="main-title">
          콘텐츠 제작 혁명, WS
        </h1>

        <p class="main-desc">
          문제지 제작과 학생 관리를<br>
          더 빠르고 감각적으로 경험하세요.
        </p>

      </div>

    </div>

    <!-- 오른쪽 -->

    <div class="right-section">

      <div class="logo">
        WS
      </div>

      <h2 class="signup-title">
        회원가입
      </h2>

      <!-- 이름 -->

      <input
        type="text"
        id="nickname"
        placeholder="닉네임">

      <!-- 아이디 -->

      <input
        type="id"
        id="id"
        placeholder="아이디">

        <!-- 이메일 -->

      <input
        type="email"
        id="email"
        placeholder="이메일">

      <!-- 비밀번호 -->

      <input
        type="password"
        id="password"
        placeholder="비밀번호 설정">

      <!-- 비밀번호 확인 -->

      <input
        type="password"
        id="passwordConfirm"
        placeholder="비밀번호 확인">

      <!-- 버튼 -->

      <button
        id="signupBtn"
        class="signup-btn">

        SIGN UP

      </button>

    </div>

  </div>

  <script type="module" src="signup.js"></script>

</body>

</html>
